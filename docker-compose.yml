services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_app
    restart: unless-stopped
    ports:
      - "8008:8008"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "if [ \"$$ENVIRONMENT\" = \"development\" ]; then
               uv run fastapi dev app/main.py --host 0.0.0.0 --port 8008;
             else
               uv run fastapi run app/main.py --host 0.0.0.0 --port 8008;
             fi"
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '10'
    depends_on:
      - db
  db:
    image: postgres:18-alpine
    restart: always
    ports:
      - '5432:5432'
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    